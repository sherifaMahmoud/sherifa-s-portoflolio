<div class="site-wrap">

    <div class="grid-bg"></div>

    <header class="top-nav">

        <div class="logo-wrap">
            <span class="logo-icon">&gt;_</span>
            <span class="logo-text">&lt;sherifaa.dev /&gt;</span>
        </div>
        <button class="menu-btn" (click)="toggleMenu()">
            ☰
        </button>
        <nav class="nav-links" [class.mobile-open]="menuOpen">
            <a href="#about" [class.active]="activeSection === 'about'"
                (click)="scrollToSection('about'); closeMenu()">01.ABOUT
            </a>
            <a href=" #skills" [class.active]="activeSection === 'skills'"
                (click)="scrollToSection('skills'); closeMenu()">
                02.Skills
            </a>
            <a href="#projects" [class.active]="activeSection === 'projects' "
                (click)="scrollToSection('projects'); closeMenu()">
                03.WORK
            </a>

            <a href=" #contact" [class.active]="activeSection === 'contact'"
                (click)="scrollToSection('contact'); closeMenu()">
                04.CONTACT
            </a>
        </nav>

    </header>


    <aside class=" left-bar">

        <div class="left-nums">
            <span>&lt;</span>
            <span>A</span>
            <span>S</span>
            <span>I</span>
            <span>D</span>
            <span>E</span>
            <span>&gt;</span>
        </div>

        <div class="left-icons">
            <div class="icon-box"><i class="fas fa-terminal"></i></div>
            <div class="icon-box"><i class="fas fa-code"></i></div>
            <div class="icon-box"><i class="fas fa-user"></i></div>
            <div class="icon-box"><i class="fas fa-envelope"></i></div>
        </div>

        <div class="left-nums">
            <span>&lt;</span>
            <span>/</span>
            <span>A</span>
            <span>S</span>
            <span>I</span>
            <span>D</span>
            <span>E</span>
            <span>&gt;</span>
        </div>

    </aside>


    <main class="page-content">

        <app-home id="home"></app-home>

        <app-about id="about"></app-about>
        <app-skills id="skills"></app-skills>

        <app-projects id="projects"></app-projects>


        <app-contact id="contact"></app-contact>
        <app-footer></app-footer>
    </main>
    <button class="scroll-top-btn" [class.show]="showScrollTop" (click)="scrollToTop()">
        ↑
    </button>
</div>
